spring:
  application:
    name: ppt-model-gateway
  config:
    import:
      - optional:classpath:ai-keys.yaml
      - optional:file:./ai-keys.yaml

# Ops HTTP endpoints + actuator only. gRPC listens separately on gateway.grpc.port.
server:
  port: 9091

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

gateway:
  grpc:
    port: 9090
  default-model: deepseek-flash
  health:
    probe-mode: real
    timeout: 8s
    cache-ttl: 15s
    probe-prompt: ping
  # Each entry is an OpenAI-compatible endpoint. base-url must NOT include the
  # trailing /v1 (the client appends /v1/chat/completions). Verify model ids and
  # base URLs against each provider's current docs.
  models:
    deepseek:
      base-url: https://api.deepseek.com
      model: deepseek-chat
      api-key: ${ai.keys.deepseek:${DEEPSEEK_API_KEY:}}
      params:
        temperature: "0.7"
        max_tokens: "8192"
    deepseek-pro:
      base-url: https://api.deepseek.com
      model: deepseek-v4-pro
      api-key: ${ai.keys.deepseek:${DEEPSEEK_API_KEY:}}
      params:
        temperature: "0.7"
        max_tokens: "8192"
    deepseek-flash:
      base-url: https://api.deepseek.com
      model: deepseek-v4-flash
      api-key: ${ai.keys.deepseek:${DEEPSEEK_API_KEY:}}
      params:
        temperature: "0.7"
        max_tokens: "8192"
    mimo:
      base-url: https://api.xiaomimimo.com
      model: mimo-v2.5-pro
      api-key: ${ai.keys.mimo:${MIMO_API_KEY:}}
      params:
        temperature: "0.7"
        max_tokens: "4096"
    minimax:
      base-url: https://api.minimax.io
      model: MiniMax-M2
      api-key: ${ai.keys.minimax:${MINIMAX_API_KEY:}}
      params:
        temperature: "0.7"
        max_tokens: "4096"
