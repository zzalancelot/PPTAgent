spring:
  application:
    name: ppt-model-gateway
  config:
    import:
      - optional:classpath:ai-keys.yaml
      - optional:file:./ai-keys.yaml
  ai:
    anthropic:
      api-key: ${ai.keys.anthropic:${ANTHROPIC_API_KEY:}}
      chat:
        options:
          model: claude-opus-4-6   # verify against Anthropic docs

# Ops HTTP endpoints + actuator only. gRPC listens separately on gateway.grpc.port.
server:
  port: 9091

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

gateway:
  grpc:
    port: 9090
  default-capability: fast-chat
  health:
    probe-mode: real
    timeout: 8s
    cache-ttl: 15s
    probe-prompt: ping
  capabilities:
    fast-chat:
      provider: anthropic
      model: claude-opus-4-6
      params:
        temperature: "0.7"
        max_tokens: "4096"
    reasoning:
      provider: anthropic
      model: claude-opus-4-6
      params:
        temperature: "0.4"
        max_tokens: "8192"
    extraction:
      provider: anthropic
      model: claude-opus-4-6
      params:
        temperature: "0.2"
        max_tokens: "2048"
